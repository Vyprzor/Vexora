<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>R.I.P. Vexora</title>
  <link rel="icon" type="image/png" href="Rip.png">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky-top: #060508;
      --sky-mid: #0d0b14;
      --sky-hor: #1a1520;
      --ground-top: #141810;
      --ground-bot: #080a06;
      --stone-hi: #cdc5be;
      --stone-mid: #a89e96;
      --stone-lo: #7a7068;
      --candle: #f0d080;
      --fog-col: rgba(160,155,175,.1);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--sky-top);
      color: #d0c8c0;
      font-family: 'IM Fell English', Georgia, serif;
      overflow: hidden;
    }

    /* ── SKY ── */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(
        to bottom,
        #04030a 0%,
        #0a0814 30%,
        #10101e 60%,
        #1a1828 80%,
        #1e1c2c 100%
      );
    }

    /* ── STARS (many, twinkling) ── */
    .stars-layer {
      position: fixed; inset: 0; z-index: 1;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--lo, .2); transform: scale(1); }
      to   { opacity: var(--hi, .9); transform: scale(1.4); }
    }

    /* ── MOON ── */
    .moon-wrap {
      position: fixed;
      top: 7vh; right: 14vw;
      z-index: 2;
      animation: moonFloat 10s ease-in-out infinite;
    }
    @keyframes moonFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    .moon {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%,
        #fdfae8 0%, #f0e898 30%, #d4c860 65%, #a89640 100%);
      box-shadow:
        0 0 0 2px rgba(240,230,150,.08),
        0 0 30px 8px  rgba(230,210,100,.20),
        0 0 80px 30px rgba(200,180, 80,.12),
        0 0 140px 60px rgba(160,140,60,.06);
    }
    /* moon craters */
    .moon::before {
      content: '';
      position: absolute;
      top: 28%; left: 55%;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(100,90,40,.25);
      box-shadow:
        -18px 22px 0 6px rgba(100,90,40,.18),
         10px -8px 0 4px rgba(100,90,40,.15);
    }
    .moon-glow {
      position: absolute;
      inset: -50%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,200,100,.06) 0%, transparent 70%);
    }

    /* ── CLOUDS ── */
    .cloud {
      position: fixed;
      z-index: 3;
      border-radius: 50%;
      filter: blur(28px);
      opacity: .06;
      animation: cloudDrift var(--cd, 60s) linear infinite;
    }
    @keyframes cloudDrift {
      from { transform: translateX(-30vw); }
      to   { transform: translateX(120vw); }
    }

    /* ── TREES ── */
    .trees {
      position: fixed;
      bottom: 28vh;
      left: 0; right: 0;
      height: 22vh;
      z-index: 4;
      pointer-events: none;
    }
    .tree {
      position: absolute;
      bottom: 0;
      width: 0;
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid #0c0e09;
      opacity: .85;
      filter: drop-shadow(0 -4px 12px rgba(0,0,0,.6));
    }
    .tree::before {
      content: '';
      position: absolute;
      bottom: 60%;
      left: 50%; transform: translateX(-50%);
      width: 0;
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid #0c0e09;
    }
    .tree::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 6px;
      height: 20%;
      background: #0a0c08;
      border-radius: 1px;
    }

    /* ── GROUND ── */
    .ground {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 30vh;
      background: linear-gradient(to bottom, #141a10 0%, #090b07 100%);
      z-index: 5;
    }
    .ground-edge {
      position: fixed;
      bottom: 30vh; left: 0; right: 0;
      height: 40px;
      z-index: 5;
      background:
        radial-gradient(ellipse 70px 20px at  5% 100%, #1a2012 0%, transparent 100%),
        radial-gradient(ellipse 90px 24px at 18% 100%, #141c0e 0%, transparent 100%),
        radial-gradient(ellipse 60px 18px at 32% 100%, #1e2616 0%, transparent 100%),
        radial-gradient(ellipse 80px 22px at 46% 100%, #141c0e 0%, transparent 100%),
        radial-gradient(ellipse 100px 26px at 60% 100%, #1a2012 0%, transparent 100%),
        radial-gradient(ellipse 65px 19px at 75% 100%, #1c2410 0%, transparent 100%),
        radial-gradient(ellipse 85px 23px at 88% 100%, #141c0e 0%, transparent 100%),
        radial-gradient(ellipse 60px 18px at 98% 100%, #1a2012 0%, transparent 100%);
      filter: blur(3px);
    }

    /* ── FOG LAYERS ── */
    .fog {
      position: fixed;
      left: -120%; right: 0;
      height: 100px;
      z-index: 6;
      filter: blur(18px);
      animation: fogDrift var(--fd, 22s) linear infinite;
    }
    @keyframes fogDrift {
      from { transform: translateX(0); }
      to   { transform: translateX(220%); }
    }

    /* ── SIDE GRAVES ── */
    .side-grave {
      position: fixed;
      bottom: 30vh;
      z-index: 7;
      animation: riseIn 2s cubic-bezier(.22,.6,.36,1) both;
    }
    .side-grave.left  { left:  4vw;  animation-delay: .4s; }
    .side-grave.right { right: 5vw;  animation-delay: .6s; }
    .side-grave.far-left  { left:  0vw; opacity: .2; animation-delay: .2s; }
    .side-grave.far-right { right: 0vw; opacity: .2; animation-delay: .7s; }

    .mini-stone {
      background: linear-gradient(150deg, #aaa099 0%, #7e7668 100%);
      border-radius: 50% 50% 3px 3px / 38% 38% 3px 3px;
      box-shadow: inset -2px -4px 10px rgba(0,0,0,.35),
                  inset 1px 2px 5px rgba(255,255,255,.12),
                  0 8px 20px rgba(0,0,0,.6);
    }
    .mini-base {
      background: linear-gradient(to bottom, #665e54, #4a4440);
      border-radius: 2px 2px 0 0;
    }

    /* ── RAVEN ── */
    .raven {
      position: fixed;
      z-index: 8;
      font-size: 1.8rem;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.8));
      animation: ravenBob 5s ease-in-out infinite;
      cursor: default;
      user-select: none;
    }
    @keyframes ravenBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-6px) rotate(3deg); }
    }

    /* ── SCENE ── */
    .scene {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 28vh;
      z-index: 10;
    }

    /* ── TOMBSTONE ── */
    .tombstone {
      position: relative;
      width: 250px;
      animation: riseIn 1.6s cubic-bezier(.22,.6,.36,1) both;
    }
    @keyframes riseIn {
      from { transform: translateY(70px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .stone-body {
      width: 100%;
      background: linear-gradient(155deg,
        #d0c8c0 0%, #bab0a6 25%, #a49890 55%, #8e8278 80%, #7a706a 100%);
      border-radius: 48% 48% 6px 6px / 38% 38% 6px 6px;
      padding: 36px 28px 28px;
      position: relative;
      text-align: center;
      box-shadow:
        inset -5px -8px 20px rgba(0,0,0,.4),
        inset 3px 4px 10px rgba(255,255,255,.2),
        inset 0 0 40px rgba(0,0,0,.15),
        0 16px 60px rgba(0,0,0,.8),
        0 6px 12px rgba(0,0,0,.6),
        0 0 80px rgba(240,210,100,.04);
    }

    /* moss patches */
    .stone-body::before {
      content: '';
      position: absolute;
      top: 12%; left: 8%; right: 8%;
      height: 3px;
      background: linear-gradient(to right,
        transparent 0%, rgba(60,70,40,.3) 20%,
        rgba(50,65,35,.4) 50%, rgba(60,70,40,.2) 80%, transparent 100%);
      border-radius: 2px;
    }
    /* crack */
    .stone-body::after {
      content: '';
      position: absolute;
      top: 18%; left: 60%;
      width: 1px; height: 35%;
      background: linear-gradient(to bottom,
        transparent, rgba(0,0,0,.3) 30%, rgba(0,0,0,.2) 70%, transparent);
      transform: rotate(6deg);
    }

    .divider {
      width: 70%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(50,45,40,.5), transparent);
      margin: 10px auto;
    }

    .stone-steps {
      position: relative;
    }
    .stone-step-1 {
      width: 115%; margin-left: -7.5%;
      height: 14px;
      background: linear-gradient(to bottom, #8c8278, #706860);
      border-radius: 2px 2px 0 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }
    .stone-step-2 {
      width: 130%; margin-left: -15%;
      height: 10px;
      background: linear-gradient(to bottom, #625a52, #4a4440);
      border-radius: 1px 1px 0 0;
      box-shadow: 0 8px 24px rgba(0,0,0,.6);
    }

    .rip-text {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 2.4rem;
      color: #302820;
      letter-spacing: .06em;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 2px 4px rgba(255,255,255,.12), 0 -1px 0 rgba(0,0,0,.3);
    }

    .cross {
      font-size: 1.1rem;
      color: #3a3228;
      margin-bottom: 8px;
      letter-spacing: .2em;
      opacity: .7;
    }

    .site-name {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: .9rem;
      color: #2c2620;
      line-height: 1.5;
    }
    .site-name strong {
      font-style: normal;
      font-size: 1.15rem;
      display: block;
      color: #1e1a14;
      letter-spacing: .04em;
      margin-bottom: 2px;
    }

    .dates {
      font-size: .74rem;
      color: #3e3830;
      letter-spacing: .14em;
      margin-top: 10px;
      font-style: normal;
    }

    .epitaph {
      font-size: .70rem;
      font-style: italic;
      color: #383028;
      margin-top: 8px;
      line-height: 1.6;
      opacity: .85;
    }

    /* flowers at base */
    .stone-flowers {
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 3px;
    }
    .flower {
      font-size: .95rem;
      animation: sway var(--sw, 3s) ease-in-out infinite alternate;
      display: block;
    }
    @keyframes sway {
      from { transform: rotate(-5deg) translateY(0); }
      to   { transform: rotate(5deg)  translateY(-2px); }
    }

    /* ── CANDLES ── */
    .candles {
      display: flex;
      gap: 220px;
      margin-top: -6px;
      position: relative;
      z-index: 11;
      align-items: flex-end;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: riseIn 2s cubic-bezier(.22,.6,.36,1) both;
      position: relative;
    }
    .candle:nth-child(1) { animation-delay: .2s; }
    .candle:nth-child(2) { animation-delay: .35s; }

    .flame-wrap {
      position: relative;
      width: 16px;
      height: 24px;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .flame-glow {
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 30px; height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,190,60,.35) 0%, transparent 70%);
      animation: glowPulse 1.4s ease-in-out infinite alternate;
    }
    @keyframes glowPulse {
      from { opacity: .6; transform: translateX(-50%) scale(.9); }
      to   { opacity: 1;  transform: translateX(-50%) scale(1.2); }
    }
    .flame-outer {
      width: 10px; height: 18px;
      background: radial-gradient(ellipse at 50% 85%,
        #f8e060 0%, #f09020 45%, rgba(220,60,10,.6) 80%, transparent 100%);
      border-radius: 50% 50% 35% 35% / 60% 60% 40% 40%;
      filter: blur(1.2px);
      animation: flicker 1.1s ease-in-out infinite alternate;
      position: relative;
      z-index: 1;
    }
    .flame-inner {
      position: absolute;
      bottom: 2px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 9px;
      background: rgba(255,255,220,.95);
      border-radius: 50%;
      filter: blur(.5px);
    }
    @keyframes flicker {
      0%   { transform: scaleX(1)    scaleY(1)    rotate(-2deg); }
      25%  { transform: scaleX(.82)  scaleY(1.12) rotate(3deg);  }
      50%  { transform: scaleX(1.08) scaleY(.92)  rotate(-1deg); }
      75%  { transform: scaleX(.88)  scaleY(1.06) rotate(2deg);  }
      100% { transform: scaleX(.95)  scaleY(1.02) rotate(-3deg); }
    }
    .candle:nth-child(2) .flame-outer { animation-delay: -.5s; }
    .candle:nth-child(2) .flame-glow  { animation-delay: -.3s; }

    .wick {
      width: 2px; height: 6px;
      background: linear-gradient(to bottom, #222, #555);
      border-radius: 1px;
    }
    .candle-body {
      position: relative;
      width: 16px; height: 52px;
      background: linear-gradient(to right,
        #d8ccb8 0%, #f0e4d0 30%, #ecdec8 60%, #c8bcaa 100%);
      border-radius: 2px 2px 1px 1px;
      box-shadow: inset -3px 0 6px rgba(0,0,0,.18),
                  inset 1px 0 3px rgba(255,255,255,.3);
      overflow: visible;
    }
    /* wax drips */
    .candle-body::before {
      content: '';
      position: absolute;
      top: 4px; left: 2px;
      width: 6px; height: 14px;
      background: linear-gradient(to bottom, #ede0cc, rgba(237,224,204,0));
      border-radius: 0 0 50% 50%;
      filter: blur(.5px);
    }
    .candle-body::after {
      content: '';
      position: absolute;
      top: 8px; right: 1px;
      width: 4px; height: 10px;
      background: linear-gradient(to bottom, #ede0cc, rgba(237,224,204,0));
      border-radius: 0 0 50% 50%;
      filter: blur(.5px);
    }
    .candle-base {
      width: 20px; height: 5px;
      background: linear-gradient(to bottom, #b8ac98, #9c9080);
      border-radius: 1px;
    }

    /* ── CANDLE GROUND GLOW ── */
    .candle-ground-glow {
      position: absolute;
      bottom: -4px; left: 50%; transform: translateX(-50%);
      width: 50px; height: 12px;
      background: radial-gradient(ellipse, rgba(240,190,60,.2) 0%, transparent 70%);
      filter: blur(4px);
    }

    /* ── MESSAGE ── */
    .message {
      position: absolute;
      bottom: 6vh;
      text-align: center;
      animation: fadeUp 2.5s 1s both;
      z-index: 10;
      width: 100%;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message p {
      font-size: .85rem;
      color: rgba(190,182,172,.4);
      font-style: italic;
      letter-spacing: .06em;
    }
    .message a {
      display: inline-block;
      margin-top: 8px;
      color: rgba(240,210,100,.55);
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color .3s, opacity .3s;
    }
    .message a:hover { color: rgba(240,210,100,.9); }

    /* ── VIGNETTE ── */
    .vignette {
      position: fixed; inset: 0; z-index: 30;
      background: radial-gradient(ellipse 80% 80% at 50% 50%,
        transparent 30%, rgba(0,0,0,.65) 100%);
      pointer-events: none;
    }
    .vignette-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      height: 20vh;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- Sky -->
<div class="sky"></div>

<!-- Stars -->
<div class="stars-layer" id="stars"></div>

<!-- Moon -->
<div class="moon-wrap">
  <div class="moon"></div>
  <div class="moon-glow"></div>
</div>

<!-- Clouds -->
<div class="cloud" style="top:12vh; width:200px; height:60px; background:#a090c0; --cd:55s;"></div>
<div class="cloud" style="top:20vh; width:260px; height:70px; background:#8080b0; --cd:80s; animation-delay:-30s;"></div>

<!-- Trees left -->
<div class="trees" id="trees"></div>

<!-- Ground -->
<div class="ground-edge"></div>
<div class="ground"></div>

<!-- Fog -->
<div class="fog" style="bottom:29vh; background:linear-gradient(to right, transparent, rgba(140,135,160,.09) 30%, rgba(140,135,160,.15) 55%, rgba(140,135,160,.09) 75%, transparent); --fd:20s;"></div>
<div class="fog" style="bottom:27vh; background:linear-gradient(to right, transparent, rgba(120,115,140,.06) 25%, rgba(120,115,140,.12) 60%, rgba(120,115,140,.06) 80%, transparent); --fd:28s; animation-delay:-14s; opacity:.8;"></div>
<div class="fog" style="bottom:31vh; background:linear-gradient(to right, transparent, rgba(100,95,120,.05) 20%, rgba(100,95,120,.09) 50%, transparent 85%); --fd:36s; animation-delay:-20s; opacity:.6;"></div>

<!-- Side graves -->
<div class="side-grave far-left">
  <div class="mini-stone" style="width:38px; height:50px;"></div>
  <div class="mini-base" style="width:120%; margin-left:-10%; height:7px;"></div>
</div>
<div class="side-grave left" style="bottom: calc(30vh - 0px);">
  <div class="mini-stone" style="width:56px; height:74px;"></div>
  <div class="mini-base" style="width:130%; margin-left:-15%; height:11px;"></div>
</div>
<div class="side-grave right">
  <div class="mini-stone" style="width:62px; height:80px;"></div>
  <div class="mini-base" style="width:130%; margin-left:-15%; height:11px;"></div>
</div>
<div class="side-grave far-right">
  <div class="mini-stone" style="width:40px; height:54px;"></div>
  <div class="mini-base" style="width:120%; margin-left:-10%; height:8px;"></div>
</div>

<!-- Raven -->
<div class="raven" style="top: 24vh; left: 20vw;">🐦‍⬛</div>

<!-- Main scene -->
<div class="scene">

  <div class="tombstone">
    <div class="stone-body">

      <div class="rip-text">R.I.P.</div>
      <div class="cross">✦ ✦ ✦</div>
      <div class="divider"></div>

      <div class="site-name">
        <strong>Vexora</strong>
        I had to take this down<br/>because of the school
      </div>

      <div class="dates">2025 — 2026</div>
      <div class="divider"></div>
      <div class="epitaph">"IT WAS<br/>THE BEST SITEEEE"</div>

      <div class="stone-flowers">
        <span class="flower" style="--sw:2.8s;">🥀</span>
        <span class="flower" style="--sw:3.5s; font-size:.75rem;">🌿</span>
        <span class="flower" style="--sw:2.2s;">🥀</span>
        <span class="flower" style="--sw:4s; font-size:.75rem;">🌿</span>
        <span class="flower" style="--sw:3.1s;">🥀</span>
      </div>

    </div>
    <div class="stone-steps">
      <div class="stone-step-1"></div>
      <div class="stone-step-2"></div>
    </div>
  </div>

  <!-- Candles flanking (positioned via gap on .candles) -->
  <div class="candles">
    <div class="candle">
      <div class="flame-wrap">
        <div class="flame-glow"></div>
        <div class="flame-outer"><div class="flame-inner"></div></div>
      </div>
      <div class="wick"></div>
      <div class="candle-body"></div>
      <div class="candle-base"></div>
      <div class="candle-ground-glow"></div>
    </div>
    <div class="candle">
      <div class="flame-wrap">
        <div class="flame-glow"></div>
        <div class="flame-outer"><div class="flame-inner"></div></div>
      </div>
      <div class="wick"></div>
      <div class="candle-body"></div>
      <div class="candle-base"></div>
      <div class="candle-ground-glow"></div>
    </div>
  </div>

  <div class="message">
    <p>This site has been laid to rest.</p>
    <!-- Uncomment to link your other site: -->
    <!-- <a href="https://yoursite.com">Visit the living →</a> -->
  </div>

</div>

<!-- Overlays -->
<div class="vignette"></div>
<div class="vignette-bottom"></div>

<script>
  // Generate many stars
  const starsEl = document.getElementById('stars');
  const starData = [
    // [x%, y%, size, lo-opacity, hi-opacity, duration, delay]
    [8,4,1.5,.3,.9,'2.8s','0s'],[15,12,1,.2,.7,'3.5s','-.8s'],[22,3,2,.4,1,'2.2s','-1.2s'],
